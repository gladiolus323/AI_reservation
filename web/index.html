<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 검사 예약 추천 시스템</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            color: white;
            padding: 20px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .chat-header-icon {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .chat-header-info h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .chat-header-info p {
            font-size: 13px;
            opacity: 0.8;
            margin-top: 4px;
        }

        .chat-header-actions {
            margin-left: auto;
        }

        .btn-reset {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .btn-reset:hover {
            background: rgba(255,255,255,0.2);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: #f8f9fa;
        }

        .message {
            display: flex;
            gap: 12px;
            max-width: 85%;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .message.assistant .message-avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .message.user .message-avatar {
            background: #2c3e50;
        }

        .message-content {
            padding: 14px 18px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.6;
        }

        .message.assistant .message-content {
            background: white;
            color: #2c3e50;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-content strong {
            display: block;
            margin-top: 10px;
            margin-bottom: 5px;
            color: #667eea;
        }

        .message.user .message-content strong {
            color: rgba(255,255,255,0.9);
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 14px 18px;
            background: white;
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }

        .chat-input-area {
            padding: 20px 25px;
            background: white;
            border-top: 1px solid #eee;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-wrapper textarea {
            flex: 1;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            padding: 14px 18px;
            font-size: 14px;
            resize: none;
            height: 52px;
            max-height: 120px;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .input-wrapper textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-send {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: transform 0.2s, opacity 0.2s;
        }

        .btn-send:hover {
            transform: scale(1.05);
        }

        .btn-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .quick-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .quick-btn {
            background: #f1f3f4;
            border: none;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 12px;
            color: #5f6368;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-btn:hover {
            background: #e8eaed;
            color: #202124;
        }

        /* 확인 버튼 스타일 */
        .confirm-actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .confirm-btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .confirm-btn.yes {
            background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
            color: white;
        }

        .confirm-btn.yes:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(39, 174, 96, 0.3);
        }

        .confirm-btn.no {
            background: #f1f3f4;
            color: #5f6368;
            border: 1px solid #dadce0;
        }

        .confirm-btn.no:hover {
            background: #e8eaed;
            color: #202124;
        }

        /* 마크다운 스타일 */
        .message-content ul, .message-content ol {
            margin: 8px 0;
            padding-left: 20px;
        }

        .message-content li {
            margin: 4px 0;
        }

        .message-content code {
            background: #f1f3f4;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
        }

        .message.user .message-content code {
            background: rgba(255,255,255,0.2);
        }

        .recommendation-card {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 12px 16px;
            margin: 10px 0;
            border-radius: 0 8px 8px 0;
        }

        .recommendation-card.recommended {
            border-left-color: #27ae60;
            background: #f0fff4;
        }

        /* 추천 선택 버튼 스타일 */
        .recommendation-buttons {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .rec-btn {
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .rec-btn.option1 {
            background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
            color: white;
        }

        .rec-btn.option1:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(39, 174, 96, 0.4);
        }

        .rec-btn.option2 {
            background: linear-gradient(135deg, #3498db 0%, #5dade2 100%);
            color: white;
        }

        .rec-btn.option2:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(52, 152, 219, 0.4);
        }

        .rec-btn.option3 {
            background: linear-gradient(135deg, #9b59b6 0%, #a569bd 100%);
            color: white;
        }

        .rec-btn.option3:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(155, 89, 182, 0.4);
        }

        .rec-btn.retry {
            background: white;
            color: #5f6368;
            border: 2px solid #dadce0;
        }

        .rec-btn.retry:hover {
            background: #f8f9fa;
            border-color: #9aa0a6;
            transform: translateY(-2px);
        }

        .rec-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .rec-btn-icon {
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="chat-header-icon">🏥</div>
            <div class="chat-header-info">
                <h1>AI 검사 예약 추천</h1>
                <p>환자번호와 처방코드를 알려주시면 최적의 예약 시간을 추천해드립니다</p>
            </div>
            <div class="chat-header-actions">
                <button class="btn-reset" onclick="resetChat()">새 대화</button>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message assistant">
                <div class="message-avatar">🩺</div>
                <div class="message-content">
                    안녕하세요! AI 검사 예약 추천 시스템입니다.<br><br>
                    검사 예약을 도와드리겠습니다. 먼저 <strong>환자번호</strong>를 알려주세요.<br><br>
                    예시: "환자번호 00003795입니다"
                </div>
            </div>
        </div>

        <div class="chat-input-area">
            <div class="input-wrapper">
                <textarea
                    id="messageInput"
                    placeholder="메시지를 입력하세요..."
                    onkeydown="handleKeyDown(event)"
                ></textarea>
                <button class="btn-send" onclick="sendMessage()" id="sendBtn">➤</button>
            </div>
            <div class="quick-actions">
                <button class="quick-btn" onclick="quickMessage('환자번호 00003795입니다')">환자번호 예시</button>
                <button class="quick-btn" onclick="quickMessage('HA443')">처방코드 예시 (CT)</button>
                <button class="quick-btn" onclick="quickMessage('MR220101')">처방코드 예시 (MRI)</button>
                <button class="quick-btn" onclick="quickMessage('오전이 좋아요')">오전 선호</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api/chat';
        let sessionId = 'session_' + Date.now();
        let isLoading = false;
        let retryCount = 0;  // 재추천 횟수 카운터
        const MAX_RETRY = 3; // 최대 재추천 횟수

        function generateSessionId() {
            return 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        }

        function addMessage(content, role) {
            const messagesDiv = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const avatar = role === 'assistant' ? '🩺' : '👤';

            // 간단한 마크다운 파싱
            let formattedContent = content
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>')
                .replace(/- (.*?)(<br>|$)/g, '• $1$2');

            // 처방명 확인 질문인지 체크 (맞으신가요? 패턴)
            const isConfirmQuestion = role === 'assistant' &&
                (content.includes('맞으신가요') || content.includes('맞습니까'));

            // 추천 버튼 표시 여부 체크 (추천 1, 추천 2, 추천 3이 모두 있는 경우)
            const hasRecommendations = role === 'assistant' &&
                content.includes('**추천 1**') &&
                content.includes('**추천 2**') &&
                content.includes('**추천 3**');

            let actionButtons = '';

            if (hasRecommendations) {
                // 추천 선택 버튼 (시스템 프롬프트의 버튼 텍스트 제거)
                formattedContent = formattedContent
                    .replace(/---<br>아래 버튼 중 하나를 선택해주세요:<br>\[추천1\] \[추천2\] \[추천3\] \[재추천\]/g, '')
                    .replace(/\[추천1\] \[추천2\] \[추천3\] \[재추천\]/g, '');

                actionButtons = `
                    <div class="recommendation-buttons">
                        <button class="rec-btn option1" onclick="selectRecommendation(1)">
                            <span class="rec-btn-icon">1️⃣</span> 추천 1 선택
                        </button>
                        <button class="rec-btn option2" onclick="selectRecommendation(2)">
                            <span class="rec-btn-icon">2️⃣</span> 추천 2 선택
                        </button>
                        <button class="rec-btn option3" onclick="selectRecommendation(3)">
                            <span class="rec-btn-icon">3️⃣</span> 추천 3 선택
                        </button>
                        <button class="rec-btn retry" onclick="selectRecommendation(0)">
                            <span class="rec-btn-icon">🔄</span> 재추천
                        </button>
                    </div>
                `;
            } else if (isConfirmQuestion) {
                actionButtons = `
                    <div class="confirm-actions">
                        <button class="confirm-btn yes" onclick="confirmExam(true)">✓ 네, 맞습니다</button>
                        <button class="confirm-btn no" onclick="confirmExam(false)">✗ 아니요, 다시 입력할게요</button>
                    </div>
                `;
            }

            messageDiv.innerHTML = `
                <div class="message-avatar">${avatar}</div>
                <div class="message-content">${formattedContent}${actionButtons}</div>
            `;

            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addTypingIndicator() {
            const messagesDiv = document.getElementById('chatMessages');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="message-avatar">🩺</div>
                <div class="typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            `;
            messagesDiv.appendChild(typingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function removeTypingIndicator() {
            const typingDiv = document.getElementById('typingIndicator');
            if (typingDiv) typingDiv.remove();
        }

        async function sendMessage() {
            if (isLoading) return;

            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (!message) return;

            // UI 업데이트
            input.value = '';
            input.style.height = '52px';
            addMessage(message, 'user');

            isLoading = true;
            document.getElementById('sendBtn').disabled = true;
            addTypingIndicator();

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        sessionId: sessionId,
                        message: message
                    })
                });

                const data = await response.json();

                removeTypingIndicator();

                if (data.success) {
                    addMessage(data.response, 'assistant');
                } else {
                    addMessage('죄송합니다. 오류가 발생했습니다: ' + data.error, 'assistant');
                }
            } catch (error) {
                removeTypingIndicator();
                addMessage('서버 연결에 실패했습니다. 잠시 후 다시 시도해주세요.', 'assistant');
                console.error('Error:', error);
            } finally {
                isLoading = false;
                document.getElementById('sendBtn').disabled = false;
            }
        }

        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function quickMessage(message) {
            document.getElementById('messageInput').value = message;
            sendMessage();
        }

        function confirmExam(isConfirmed) {
            // 확인 버튼 비활성화 (중복 클릭 방지)
            const confirmBtns = document.querySelectorAll('.confirm-btn');
            confirmBtns.forEach(btn => {
                btn.disabled = true;
                btn.style.opacity = '0.5';
                btn.style.cursor = 'not-allowed';
            });

            if (isConfirmed) {
                // 맞다고 확인 → 네, 맞습니다 메시지 전송
                document.getElementById('messageInput').value = '네, 맞습니다';
            } else {
                // 아니라고 함 → 다시 입력하겠다는 메시지 전송
                document.getElementById('messageInput').value = '아니요, 처방코드를 다시 입력할게요';
            }
            sendMessage();
        }

        function selectRecommendation(optionNumber) {
            // 추천 버튼 비활성화 (중복 클릭 방지)
            const recBtns = document.querySelectorAll('.rec-btn');
            recBtns.forEach(btn => {
                btn.disabled = true;
            });

            // 재추천인 경우 카운터 증가
            if (optionNumber === 0) {
                retryCount++;

                // 5회 초과 시 전화번호 안내
                if (retryCount >= MAX_RETRY) {
                    addMessage('다른 시간대로 재추천해주세요', 'user');
                    addMessage(
                        '원하시는 시간대를 찾기 어려우시네요. 😔\n\n' +
                        '검사 예약 관련하여 직접 상담을 원하시면 아래 번호로 연락해주세요.\n\n' +
                        '📞 **검사예약 문의**: xxx-xxxx\n' +
                        '⏰ **운영시간**: 평일 09:00 ~ 17:00\n\n' +
                        '전문 상담원이 최적의 시간을 찾아드리겠습니다.',
                        'assistant'
                    );
                    retryCount = 0; // 카운터 리셋
                    return;
                }
            } else {
                // 추천 선택 시 카운터 리셋
                retryCount = 0;
            }

            let message = '';
            switch (optionNumber) {
                case 1:
                    message = '추천 1번으로 예약할게요';
                    break;
                case 2:
                    message = '추천 2번으로 예약할게요';
                    break;
                case 3:
                    message = '추천 3번으로 예약할게요';
                    break;
                case 0:
                    message = '다른 시간대로 재추천해주세요';
                    break;
            }

            document.getElementById('messageInput').value = message;
            sendMessage();
        }

        function resetChat() {
            // 서버 세션 초기화
            fetch(`${API_URL}/${sessionId}`, { method: 'DELETE' });

            // 새 세션 시작
            sessionId = generateSessionId();
            retryCount = 0; // 재추천 카운터 리셋

            // UI 초기화
            const messagesDiv = document.getElementById('chatMessages');
            messagesDiv.innerHTML = `
                <div class="message assistant">
                    <div class="message-avatar">🩺</div>
                    <div class="message-content">
                        안녕하세요! AI 검사 예약 추천 시스템입니다.<br><br>
                        검사 예약을 도와드리겠습니다. 먼저 <strong>환자번호</strong>를 알려주세요.<br><br>
                        예시: "환자번호 00003795입니다"
                    </div>
                </div>
            `;
        }

        // 텍스트 영역 자동 높이 조절
        document.getElementById('messageInput').addEventListener('input', function() {
            this.style.height = '52px';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });
    </script>
</body>
</html>
